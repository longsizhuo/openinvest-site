name: Deploy to Cloudflare Pages

# 站点已从 GitHub Pages 迁到 Cloudflare Pages（项目 openinvest-site）。
# 国内连 github.io/Fastly 被限速，CF 网络可达性更好。push main 自动重新部署。

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Deploy to Cloudflare Pages
        # 用 npx 直跑（wrangler-action 会 pnpm add wrangler 跟本仓库锁文件冲突）
        run: npx --yes wrangler@4 pages deploy dist --project-name=openinvest-site --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
