name: Deploy to Cloudflare Pages

# 站点已从 GitHub Pages 迁到 Cloudflare Pages（项目 openinvest-site）。
# 国内连 github.io/Fastly 被限速，CF 网络可达性更好。push main 自动重新部署。

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

# 最小权限：只 checkout 代码，部署靠 CF token，GITHUB_TOKEN 不需要任何写权限
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 外部 action 钉到 commit SHA（带部署 token 的 job，防供应链篡改；# v4 供 dependabot 升级）
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Deploy to Cloudflare Pages
        # 用 npx 直跑（wrangler-action 会 pnpm add wrangler 跟本仓库锁文件冲突）；钉精确版本
        run: npx --yes wrangler@4.105.0 pages deploy dist --project-name=openinvest-site --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
